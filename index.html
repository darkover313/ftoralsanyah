<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطر السنيه - النظام السحابي</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root { --primary: #2d6a4f; --secondary: #1a472a; --gold: #f9c74f; --beige: #f8f3e0; --danger: #c4452c; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--secondary); min-height: 100vh; display: flex; flex-direction: column; color: #333; overflow-x: hidden; }
        .header { background: var(--primary); color: var(--gold); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        #map { height: 380px; width: 100%; z-index: 1; background: #eee; border-bottom: 2px solid var(--gold); }
        .company-info-section { background: var(--beige); padding: 20px; flex-grow: 1; border-top: 5px solid var(--primary); }
        .info-card { background: var(--white); border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px; border-right: 5px solid var(--gold); }
        .info-card h3 { color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .info-card p { font-size: 0.95rem; line-height: 1.6; color: #555; }
        .footer-contact { background: var(--white); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; position: sticky; bottom: 0; width: 100%; z-index: 100; }
        .contact-btn { text-decoration: none; color: white; font-weight: bold; padding: 12px 25px; border-radius: 25px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-call { background: var(--primary); }
        .btn-wa { background: #25D366; }
        .custom-marker { background: var(--gold); border: 2px solid white; border-radius: 8px; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-align: center; position: relative; width: 110px !important; font-weight: bold; font-size: 12px; color: var(--secondary); }
        .custom-marker::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid var(--gold); }
        #addShopForm, .login-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; display: none; z-index: 10000; width: 85%; max-width: 350px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.8); border: 4px solid var(--gold); flex-direction: column; }
        .admin-trigger { position: fixed; top: 20px; left: 20px; width: 45px; height: 45px; background: rgba(26, 71, 42, 0.7); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; cursor: pointer; border: 1.5px solid var(--gold); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-save { background: var(--gold); color: var(--secondary); }
        .btn-cancel { background: var(--danger); color: white; }
        #shopsListAdmin { max-height: 150px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; padding: 5px; }
        .shop-item-admin { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="admin-trigger" onclick="openLogin()"><i class="fas fa-lock"></i></div>
<div class="header"><h2><i class="fas fa-mushroom"></i> فطر السنيه</h2></div>
<div id="map"></div>

<div class="company-info-section">
    <div class="info-card">
        <h3><i class="fas fa-building"></i> عن المشروع</h3>
        <p>تجهيز وتوزيع الفطر الطازج يومياً في قضاء السنيه. نضمن لكم الجودة والطعم المميز.</p>
    </div>
</div>

<div class="footer-contact">
    <a href="tel:+9647868779825" class="contact-btn btn-call"><i class="fas fa-phone-alt"></i> إتصال</a>
    <a href="https://wa.me/+9647868779825" class="contact-btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
</div>

<div id="addShopForm">
    <h3 style="text-align: center;">إضافة موقع جديد</h3>
    <input type="text" id="sName" placeholder="اسم المحل/الوكيل">
    <input type="tel" id="sPhone" placeholder="رقم الموبايل">
    <button class="btn btn-save" onclick="confirmSave()">حفظ في السيرفر ✅</button>
    <button class="btn btn-cancel" onclick="closeForm()">إلغاء</button>
</div>

<div class="login-modal" id="loginModal">
    <h3 style="text-align:center">لوحة التحكم</h3>
    <div id="loginFields">
        <input type="password" id="passCode" placeholder="كلمة السر">
        <button class="btn btn-save" onclick="verifyLogin()">دخول</button>
    </div>
    <div id="adminControls" style="display:none;">
        <p style="color: green; font-size: 13px; text-align: center;">تم التفعيل: انقر على الخريطة للإضافة</p>
        <div id="shopsListAdmin"></div>
    </div>
    <button class="btn btn-cancel" onclick="openLogin()">إغلاق</button>
</div>

<script type="module">
    // استيراد مكتبات Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // الإعدادات الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyC_sKFsr9RPg3nWTmw2KYIA8OCK6y6BOLI",
        authDomain: "anyah-72c8a.firebaseapp.com",
        databaseURL: "https://anyah-72c8a-default-rtdb.firebaseio.com",
        projectId: "anyah-72c8a",
        storageBucket: "anyah-72c8a.firebasestorage.app",
        messagingSenderId: "161050950905",
        appId: "1:161050950905:web:5777eaf327f702f608f628"
    };

    // تشغيل Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const shopsRef = ref(db, 'locations'); // اسم المجلد في قاعدة البيانات

    const _key = "aGFzYW4zMTM="; // كلمة السر: hasan313
    let map, isLogged = false, tempPos = null, shops = [];

    // دالة تهيئة الخريطة
    window.initMap = function() {
        map = L.map('map', { tap: false }).setView([32.0640, 44.7721], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

        map.on('click', (e) => {
            if (isLogged) {
                tempPos = e.latlng;
                document.getElementById('addShopForm').style.display = 'flex';
            }
        });
    };

    // الاستماع للبيانات من السيرفر فوراً
    onValue(shopsRef, (snapshot) => {
        const data = snapshot.val();
        shops = data ? Object.values(data) : [];
        renderMarkers();
        if (isLogged) renderAdminList();
    });

    window.verifyLogin = function() {
        if (document.getElementById('passCode').value === atob(_key)) {
            isLogged = true;
            document.getElementById('loginFields').style.display = 'none';
            document.getElementById('adminControls').style.display = 'block';
            renderAdminList();
        } else { alert("كلمة السر خاطئة!"); }
    };

    window.confirmSave = function() {
        const name = document.getElementById('sName').value;
        const phone = document.getElementById('sPhone').value;
        if (!name || !phone) { alert("أدخل البيانات كاملة"); return; }
        
        const id = Date.now();
        // الحفظ في Firebase
        set(ref(db, 'locations/' + id), { id, lat: tempPos.lat, lng: tempPos.lng, name, phone })
        .then(() => {
            closeForm();
            document.getElementById('sName').value = '';
            document.getElementById('sPhone').value = '';
        });
    };

    window.deleteShop = function(id) {
        if(confirm("هل تريد حذف هذا الموقع نهائياً؟")) {
            remove(ref(db, 'locations/' + id));
        }
    };

    function renderMarkers() {
        if(!map) return;
        // تنظيف الخريطة من الماركرات القديمة
        map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
        
        shops.forEach(s => {
            const icon = L.divIcon({
                className: '',
                html: `<div class="custom-marker">${s.name}</div>`,
                iconSize: [110, 40], iconAnchor: [55, 45]
            });
            L.marker([s.lat, s.lng], { icon }).addTo(map)
             .bindPopup(`<b>${s.name}</b><br>📞 ${s.phone}<br><a href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank">فتح في خرائط جوجل</a>`);
        });
    }

    window.renderAdminList = function() {
        const list = document.getElementById('shopsListAdmin');
        list.innerHTML = "";
        shops.forEach(s => {
            const div = document.createElement('div');
            div.className = 'shop-item-admin';
            div.innerHTML = `<span>${s.name}</span> <button onclick="deleteShop(${s.id})" style="color:red; border:none; background:none; cursor:pointer;">حذف</button>`;
            list.appendChild(div);
        });
    };

    window.openLogin = () => { 
        const modal = document.getElementById('loginModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex'; 
    };
    window.closeForm = () => { document.getElementById('addShopForm').style.display = 'none'; };

    window.onload = initMap;
</script>
</body>
</html>
